version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: flaskcrud_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flaskcrud
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build: .
    container_name: flaskcrud_app
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DB: flaskcrud

volumes:
  db_data:
